steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "--build-arg"
      - "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_GOOGLE_MAPS_KEY}"
      - "-t"
      - "gcr.io/$PROJECT_ID/second-act-chicago:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/second-act-chicago:latest"
      - "."

  # Push to Google Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "gcr.io/$PROJECT_ID/second-act-chicago"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - second-act-chicago
      - "--image=gcr.io/$PROJECT_ID/second-act-chicago:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--set-env-vars=GEMINI_API_KEY=${_GEMINI_KEY}"

substitutions:
  _GOOGLE_MAPS_KEY: ""
  _GEMINI_KEY: ""

images:
  - "gcr.io/$PROJECT_ID/second-act-chicago:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/second-act-chicago:latest"

options:
  logging: CLOUD_LOGGING_ONLY
