name: Deploy to Vercel (Free)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: second-act/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: second-act
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        working-directory: second-act
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        working-directory: second-act
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# SETUP (one-time, ~5 minutes):
#
# 1. Go to https://vercel.com → New Project → Import Git Repository
#    → select djetton6/second-act → set Root Directory to "second-act"
#
# 2. Add Environment Variables in Vercel dashboard:
#    NEXT_PUBLIC_GOOGLE_MAPS_API_KEY = <your-google-maps-api-key>
#    GEMINI_API_KEY                  = <your-gemini-api-key>
#
# 3. Get your Vercel token: https://vercel.com/account/tokens
#    Add it to GitHub → Settings → Secrets → VERCEL_TOKEN
#
# 4. Push any commit → auto-deploys!
# ─────────────────────────────────────────────────────────────────────────────
